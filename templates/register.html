<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: #0a0f1c;
    color: white;
    font-family: system-ui;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: #111827;
    padding: 40px;
    border-radius: 15px;
    width: 300px;
}
input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}
button {
    background: #3b82f6;
    color: white;
}
</style>
</head>
<body>

<div class="box">
<h2>Registro</h2>

<form method="POST">
    <input name="username" placeholder="Usuario">
    <input name="password" type="password" placeholder="Contraseña">
    <button>Crear cuenta</button>
</form>

<a href="/login">Volver al login</a>
</div>

</body>
</html>
