<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Agenda Inteligente</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0a0f1c;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #0f172a;
    height: 100vh;
    padding: 20px;
}

.sidebar a {
    display: block;
    margin-top: 10px;
    color: #94a3b8;
    text-decoration: none;
}

.sidebar a:hover {
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
}

/* FORM */
form {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #111a2e;
    color: white;
}

input {
    flex: 1;
}

select {
    min-width: 180px;
}

input:focus, select:focus {
    outline: none;
    box-shadow: 0 0 0 2px #3b82f6;
}

button {
    padding: 12px 16px;
    background: #3b82f6;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.08);
}

/* BADGES */
.badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    margin-right: 6px;
}

.pendiente { background: #334155; }
.completada { background: #16a34a; }

/* PRIORIDAD */
.urgente { border-left: 4px solid #ef4444; }
.alta { border-left: 4px solid #f59e0b; }
.media { border-left: 4px solid #3b82f6; }
.baja { border-left: 4px solid #22c55e; }

</style>
</head>

<body>

<div class="sidebar">
    <h3>🧠 Agenda</h3>
    <a href="/">🏠 Home</a>
    <a href="/chart">📊 Dashboard</a>
</div>

<div class="main">

<h2>📋 Mis tareas</h2>

<p>📊 Progreso: {{ progress }}%</p>

<form action="/add" method="POST">
    <input name="title" placeholder="Nueva tarea..." required>

    <select name="category" required>
        <option value="">Seleccionar categoría</option>
        {% for c in categories %}
            <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
    </select>

    <button type="submit">➕</button>
</form>

{% if tasks %}
    {% for t in tasks %}
    <div class="card {{ t[5] }}">
        <b>{{ t[1] }}</b><br>

        <span class="badge">{{ t[3] }}</span>
        <span class="badge">{{ t[5] }}</span>
        <span class="badge {{ t[7] }}">{{ t[7] }}</span>

        <div style="margin-top:8px;">
            <a href="/complete/{{ t[0] }}">✔</a>
            <a href="/delete/{{ t[0] }}">🗑</a>
        </div>
    </div>
    {% endfor %}
{% else %}
    <p>No hay tareas aún 🚀</p>
{% endif %}

</div>

</body>
</html>
