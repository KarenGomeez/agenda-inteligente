<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Agenda Inteligente</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0a0f1c;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #0f172a;
    height: 100vh;
    padding: 20px;
}

.sidebar h3 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    margin-bottom: 10px;
}

.sidebar a:hover {
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
}

/* PROGRESS */
.progress-bar {
    width: 100%;
    height: 10px;
    background: #1e293b;
    border-radius: 10px;
    margin: 10px 0 20px;
}

.progress-fill {
    height: 10px;
    background: linear-gradient(90deg, #3b82f6, #22c55e);
    border-radius: 10px;
}

/* FORM */
form {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #111a2e;
    color: white;
}

button {
    padding: 12px 16px;
    background: #3b82f6;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card:hover {
    background: rgba(255,255,255,0.08);
}

.title {
    font-weight: bold;
}

.meta {
    font-size: 13px;
    color: #94a3b8;
}

/* PRIORIDAD */
.urgente { border-left: 4px solid red; }
.alta { border-left: 4px solid orange; }
.media { border-left: 4px solid blue; }
.baja { border-left: 4px solid green; }

.actions a {
    margin-left: 10px;
    text-decoration: none;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h3>🧠 Agenda</h3>
    <a href="/">🏠 Home</a>
    <a href="/logout">🚪 Logout</a>
</div>

<div class="main">

<h2>📋 Mis tareas</h2>

<p>Progreso: {{ progress }}%</p>
<div class="progress-bar">
    <div class="progress-fill" style="width: {{ progress }}%"></div>
</div>

<form action="/add" method="POST">

    <input name="title" placeholder="Nueva tarea..." required>

    <select name="category" required>
        <option value="">Categoría</option>
        {% for c in categories %}
            <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
    </select>

    <select name="priority" required>
        <option value="">Prioridad</option>
        <option value="urgente">🔴 Urgente</option>
        <option value="alta">🟠 Alta</option>
        <option value="media">🔵 Media</option>
        <option value="baja">🟢 Baja</option>
    </select>

    <button type="submit">➕</button>
</form>

{% if tasks %}
    {% for t in tasks %}
    <div class="card {{ t[4] }}">
        <div>
            <div class="title">{{ t[2] }}</div>
            <div class="meta">
                {{ t[3] }} · {{ t[4] }} · {{ t[5] }}
            </div>
        </div>

        <div class="actions">
            <a href="/complete/{{ t[0] }}">✔</a>
            <a href="/delete/{{ t[0] }}">🗑</a>
        </div>
    </div>
    {% endfor %}
{% else %}
    <p>No hay tareas aún 🚀</p>
{% endif %}

</div>
</body>
</html>
