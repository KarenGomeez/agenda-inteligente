<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Agenda Inteligente</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #020617;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    background: #0f172a;
    height: 100vh;
    padding: 20px;
}

.logo {
    font-weight: bold;
    margin-bottom: 20px;
}

.menu a {
    display: block;
    padding: 10px;
    color: #94a3b8;
    text-decoration: none;
    border-radius: 8px;
    margin-bottom: 6px;
}

.menu a:hover {
    background: rgba(255,255,255,0.08);
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
}

/* HEADER */
.header {
    font-size: 22px;
    font-weight: bold;
}

/* PROGRESS GLOBAL */
.progress-bar {
    width: 100%;
    height: 8px;
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
    margin: 10px 0 20px;
}

.progress-fill {
    height: 8px;
    background: linear-gradient(90deg, #3b82f6, #22c55e);
    width: 0%;
}

/* STATS */
.stats {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.stat {
    background: #111827;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
}

/* FORM */
form {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #0f172a;
    color: white;
}

select {
    appearance: none;
}

button {
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

/* CARDS */
.card {
    background: #111827;
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-2px);
}

/* PRIORIDAD */
.urgente { border-left: 4px solid #ef4444; }
.alta { border-left: 4px solid #f59e0b; }
.media { border-left: 4px solid #3b82f6; }
.baja { border-left: 4px solid #22c55e; }

/* BADGES */
.badge {
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    margin-left: 5px;
}

.pendiente { background: #334155; }
.completada { background: #16a34a; }

/* COMPLETADO */
.completed {
    text-decoration: line-through;
    opacity: 0.6;
}

/* BARRA POR TAREA */
.task-progress {
    width: 100%;
    height: 5px;
    background: #1e293b;
    border-radius: 10px;
    margin-top: 8px;
    overflow: hidden;
}

.task-progress-fill {
    height: 5px;
    width: 40%;
    background: #3b82f6;
}

/* si está completa */
.task-progress-fill.done {
    width: 100%;
    background: #22c55e;
}

/* ACTIONS */
.actions a {
    margin-left: 10px;
    text-decoration: none;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">🧠 Agenda</div>

    <div class="menu">
        <a href="/">🏠 Home</a>
        <a href="/?filter=urgent">🚨 Urgentes</a>
        <a href="/?filter=pending">⏳ Pendientes</a>
        <a href="/?filter=completed">✔ Completadas</a>
        <a href="/chart">📊 Dashboard</a>
    </div>
</div>

<div class="main">

<div class="header">📋 Mis tareas</div>

<p>Progreso: {{ progress }}%</p>

<div class="progress-bar">
    <div class="progress-fill" data-progress="{{ progress }}"></div>
</div>

<!-- STATS -->
<div class="stats">
    <div class="stat">📋 {{ total }}</div>
    <div class="stat">✔ {{ completed }}</div>
    <div class="stat">⏳ {{ pending }}</div>
    <div class="stat">🚨 {{ urgent }}</div>
</div>

<!-- FORM -->
<form action="/add" method="POST">

    <input name="title" placeholder="Nueva tarea..." required>

    <select name="category" required>
        <option value="">Categoría</option>
        {% for c in categories %}
            <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
    </select>

    <!-- 🔥 NUEVO: PRIORIDAD -->
    <select name="priority">
        <option value="">Prioridad (auto)</option>
        <option value="urgente">🔴 Urgente</option>
        <option value="alta">🟠 Alta</option>
        <option value="media">🔵 Media</option>
        <option value="baja">🟢 Baja</option>
    </select>

    <button type="submit">+</button>
</form>

<!-- TASKS -->
{% for t in tasks %}
<div class="card {{ t[5] }}">

    <div>
        <div class="{% if t[7]=='completada' %}completed{% endif %}">
            📌 {{ t[1] }}
        </div>

        <div style="font-size:12px; color:#94a3b8;">
            {{ t[3] }} - {{ t[5] }}
            <span class="badge {{ t[7] }}">{{ t[7] }}</span>
        </div>

        <!-- 🔥 BARRA POR TAREA -->
        <div class="task-progress">
            <div class="task-progress-fill {% if t[7]=='completada' %}done{% endif %}"></div>
        </div>
    </div>

    <div class="actions">
        <a href="/complete/{{ t[0] }}">✔</a>
        <a href="/edit/{{ t[0] }}">✏️</a>
        <a href="/delete/{{ t[0] }}">🗑</a>
    </div>

</div>
{% endfor %}

</div>

<script>
const bar = document.querySelector(".progress-fill");
const progress = bar.getAttribute("data-progress");
bar.style.width = progress + "%";
</script>

</body>
</html>
</html>
