<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Agenda Inteligente</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0a0f1c;
    color: white;
    display: flex;
}

.sidebar {
    width: 220px;
    background: #0f172a;
    height: 100vh;
    padding: 20px;
}

.main {
    flex: 1;
    padding: 30px;
}

form {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #111a2e;
    color: white;
}

button {
    padding: 12px;
    background: #3b82f6;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h3>🧠 Agenda</h3>
    <a href="/">🏠 Home</a><br><br>
    <a href="/chart">📊 Dashboard</a>
</div>

<div class="main">

<h2>📋 Mis tareas</h2>

<p>📊 Progreso: {{ progress }}%</p>

<!-- FORM -->
<form action="/add" method="POST">

    <input name="title" placeholder="Nueva tarea..." required>

    <!-- 🔥 DROPDOWN REAL -->
    <select name="category" required>
        <option value="">Seleccionar categoría</option>
        {% for c in categories %}
            <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
    </select>

    <button type="submit">➕</button>
</form>

<!-- TASKS -->
{% if tasks %}
    {% for t in tasks %}
    <div class="card">
        <b>{{ t[1] }}</b><br>

        📂 {{ t[3] }} |
        ⚡ {{ t[5] }} |
        📌 {{ t[7] }}

        <div>
            <a href="/complete/{{ t[0] }}">✔</a>
            <a href="/delete/{{ t[0] }}">🗑</a>
        </div>
    </div>
    {% endfor %}
{% else %}
    <p>No hay tareas aún 🚀</p>
{% endif %}

</div>

</body>
</html>
