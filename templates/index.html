<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Agenda Inteligente</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0a0f1c;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #0f172a;
    height: 100vh;
    padding: 20px;
    border-right: 1px solid rgba(255,255,255,0.05);
}

.logo {
    font-weight: bold;
    margin-bottom: 20px;
}

.menu a {
    display: block;
    padding: 10px;
    color: #94a3b8;
    text-decoration: none;
    border-radius: 8px;
    margin-bottom: 6px;
}

.menu a:hover {
    background: rgba(255,255,255,0.08);
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
}

/* HEADER */
.header {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 15px;
}

/* PROGRESS */
.progress-bar {
    width: 100%;
    height: 8px;
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 15px;
}

.progress-fill {
    height: 8px;
    background: linear-gradient(90deg, #3b82f6, #22c55e);
    width: 0%;
}

/* FILTER BUTTONS */
.filters {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.filters a {
    padding: 6px 10px;
    background: #111a2e;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    font-size: 12px;
}

/* FORM */
form {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #111a2e;
    color: white;
}

/* FIX SELECT */
select {
    appearance: none;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

/* CARDS */
.card {
    background: #111827;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* PRIORIDAD */
.urgente { border-left: 4px solid #ef4444; }
.alta { border-left: 4px solid #f59e0b; }
.media { border-left: 4px solid #3b82f6; }
.baja { border-left: 4px solid #22c55e; }

/* BADGES */
.badge {
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    margin-left: 5px;
}

.pendiente { background: #334155; }
.completada { background: #16a34a; }

/* ACTIONS */
.actions a {
    margin-left: 10px;
    text-decoration: none;
    font-size: 16px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">🧠 Agenda</div>

    <div class="menu">
        <a href="/">🏠 Home</a>
        <a href="/?filter=urgent">🚨 Urgentes</a>
        <a href="/?filter=pending">⏳ Pendientes</a>
        <a href="/?filter=completed">✔ Completadas</a>
        <a href="/chart">📊 Dashboard</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">📋 Mis tareas</div>

<p>Progreso: {{ progress }}%</p>

<div class="progress-bar">
    <div class="progress-fill" data-progress="{{ progress }}"></div>
</div>

<!-- FILTROS -->
<div class="filters">
    <a href="/">Todos</a>
    <a href="/?filter=urgent">🚨</a>
    <a href="/?filter=pending">⏳</a>
    <a href="/?filter=completed">✔</a>
</div>

<!-- FORM -->
<form action="/add" method="POST">

    <input name="title" placeholder="Nueva tarea..." required>

    <select name="category" required>
        <option value="">Categoría</option>
        {% for c in categories %}
            <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
    </select>

    <button type="submit">➕</button>
</form>

<!-- TASKS -->
{% for t in tasks %}
<div class="card {{ t[5] }}">

    <div>
        <b>{{ t[1] }}</b><br>
        {{ t[3] }} - {{ t[5] }}
        <span class="badge {{ t[7] }}">{{ t[7] }}</span>
    </div>

    <div class="actions">
        <a href="/complete/{{ t[0] }}">✔</a>
        <a href="/delete/{{ t[0] }}">🗑</a>
    </div>

</div>
{% endfor %}

</div>

<script>
const bar = document.querySelector(".progress-fill");
const progress = bar.getAttribute("data-progress");
bar.style.width = progress + "%";
</script>

</body>
</html>
