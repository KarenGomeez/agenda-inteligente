<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Agenda Inteligente</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0a0f1c;
    color: white;
    display: flex;
}

.sidebar {
    width: 220px;
    background: #0f172a;
    height: 100vh;
    padding: 20px;
}

.main {
    flex: 1;
    padding: 30px;
}

/* PROGRESS */
.progress-bar {
    width: 100%;
    height: 10px;
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}

.progress-fill {
    height: 10px;
    background: linear-gradient(90deg, #3b82f6, #22c55e);
}

/* FORM */
form {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
}

input, select {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #111a2e;
    color: white;
}

button {
    padding: 12px;
    background: #3b82f6;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
}

/* PRIORIDADES */
.urgente { border-left: 4px solid #ef4444; }
.alta { border-left: 4px solid #f59e0b; }
.media { border-left: 4px solid #3b82f6; }
.baja { border-left: 4px solid #22c55e; }

a {
    color: #3b82f6;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="sidebar">
    <h3>🧠 Agenda</h3>
    <a href="/">🏠 Home</a><br><br>
    <a href="/chart">📊 Dashboard</a>
</div>

<div class="main">

<h2>📋 Mis tareas</h2>

<p>📊 Progreso: {{ progress }}%</p>

<div class="progress-bar">
    <div class="progress-fill" style="width: {{ progress }}%"></div>
</div>

<!-- FORM -->
<form action="/add" method="POST">

    <input name="title" placeholder="Nueva tarea..." required>

    <input name="category" list="categories" placeholder="Categoría">

    <datalist id="categories">
        {% for c in categories %}
            <option value="{{ c }}">
        {% endfor %}
    </datalist>

    <!-- PRIORIDAD -->
    <select name="priority">
        <option value="auto">🤖 Auto</option>
        <option value="baja">🟢 Baja</option>
        <option value="media">🔵 Media</option>
        <option value="alta">🟠 Alta</option>
        <option value="urgente">🔴 Urgente</option>
    </select>

    <button type="submit">➕</button>
</form>

<!-- TASKS -->
{% if tasks %}
    {% for t in tasks %}
    <div class="card {{ t[5] }}">
        <div>
            <b>{{ t[1] }}</b><br>
            {{ t[3] }} · {{ t[5] }} · {{ t[7] }}
        </div>

        <div>
            <a href="/complete/{{ t[0] }}">✔</a>
            <a href="/edit/{{ t[0] }}">✏️</a>
            <a href="/delete/{{ t[0] }}">🗑</a>
        </div>
    </div>
    {% endfor %}
{% else %}
    <p>No hay tareas aún 🚀</p>
{% endif %}

</div>

</body>
</html>
